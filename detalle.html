<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto - SmartStore</title>
    <style>
        :root {
            --primary: #2ecc71; --secondary: #3498db; --dark: #2c3e50; 
            --light: #f4f4f9; --white: #ffffff;
            --whatsapp: #25D366; /* Color oficial de WhatsApp */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--light); 
            color: var(--dark); 
        }

        .nav-back { 
            padding: 15px 5%; 
            background: var(--dark); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-back a { 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .detail-container { 
            max-width: 1100px; 
            margin: 30px auto; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            background: var(--white); 
            border-radius: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* --- SLIDER --- */
        .slider-container {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #fff;
        }

        .slider-wrapper {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
            cursor: grab;
        }

        .slider-wrapper:active { cursor: grabbing; }

        .slider-wrapper img {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 5;
        }

        .slider-btn:hover { background: var(--primary); }
        .prev-btn { left: 10px; }
        .next-btn { right: 10px; }

        .slider-dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }

        .dot.active { background: var(--primary); transform: scale(1.2); }

        /* --- INFO SECTION --- */
        .info-section { display: flex; flex-direction: column; justify-content: center; }

        .category-badge {
            background: #eee; color: #777; padding: 5px 12px;
            border-radius: 20px; font-size: 0.8rem; text-transform: uppercase;
            width: fit-content; margin-bottom: 10px;
        }

        .price-tag { 
            font-size: 2.5rem; font-weight: bold; 
            color: var(--primary); margin-bottom: 25px; 
        }

        .description-container { position: relative; margin-bottom: 20px; }

        .full-description { 
            line-height: 1.8; color: #555; font-size: 1.1rem;
            overflow: hidden; max-height: 80px; transition: max-height 0.5s ease;
        }

        .full-description.expanded { max-height: 1000px; }

        .btn-toggle-text {
            background: none; border: none; color: var(--secondary);
            font-weight: bold; cursor: pointer; padding: 10px 0;
        }

        .buy-box { 
            padding: 25px; border: 2px solid #f0f0f0; 
            border-radius: 15px; background: #fafafa;
        }

        .btn-add { 
            width: 100%; background: #ffc814; color: black;
            border: none; padding: 18px; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 15px;
        }

        .btn-add:hover { background: #ffd814; transform: translateY(-2px); }

        /* --- BOTONES DE COMPARTIR --- */
        .share-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-share {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
        }

        .btn-whatsapp:hover {
            background: #20ba56;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #e1e8ed;
            color: var(--dark);
        }

        .btn-copy:hover {
            background: #d1d8dd;
            transform: translateY(-2px);
        }

        @media (max-width: 850px) {
            .detail-container { grid-template-columns: 1fr; margin: 10px; }
            .slider-container { height: 350px; }
        }
        
        /* media query para moviles */
        @media (max-width: 600px) {
            .detail-container { 
                margin: 0;
                padding: 5px;
                gap: 20px;
            }
        }

        /* --- ANIMACIÓN DE NOTIFICACIÓN --- */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            transform: translateX(120%); /* Empieza fuera de la pantalla */
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast-notification.show {
            transform: translateX(0); /* Entra a la pantalla */
        }

        .toast-icon {
            font-size: 1.5rem;
        }
    </style>
</head>

            ] },
            
            { id: 10, category: 'computacion',

            priceUSD: 1250.00, 
            description: "Pantalla OLED de 15.6 pulgadas con colores vibrantes y negros profundos. Potenciada por el último procesador de alto rendimiento y 32GB de RAM para tareas pesadas como edición de video, renderizado 3D y desarrollo de software complejo.", 
            images: [
                   "https://placehold.co/800x800/ffc814/white?text=Imagen+1",
                   "https://placehold.co/800x800/ffc814/white?text=Imagen+2",
                   "https://placehold.co/800x800/ffc814/white?text=Imagen+3"
            ] }
        
        ];

        // --- CONFIGURACIÓN DE TASAS MANUALES ---
        const manualExchangeRates = {
            'VES': 500.00, 
            'EUR': 0.92,  
            'PEN': 3.75   
        };

        // --- LÓGICA DE MONEDA Y ESTADO ---
        const params = new URLSearchParams(window.location.search);
        const productId = parseInt(params.get('id'));
        const p = allProducts.find(item => item.id === productId);

        let currentCurrency = localStorage.getItem('currency') || 'USD';
        let exchangeRate = 1;
        let currentSlide = 0;

        // --- FUNCIONES DE MONEDA ACTUALIZADAS ---
        async function initApp() {
            if (currentCurrency !== 'USD') {
                try {
                    const res = await fetch('https://open.er-api.com/v6/latest/USD');
                    const data = await res.json();
                    
                    if (data && data.rates && data.rates[currentCurrency]) {
                        exchangeRate = data.rates[currentCurrency];
                    } else {
                        throw new Error("Falla en datos de API");
                    }
                } catch (e) { 
                    console.warn("Usando tasa manual en página de detalles");
                    exchangeRate = manualExchangeRates[currentCurrency] || 1; 
                }
            } else {
                exchangeRate = 1;
            }
            renderDetail();
        }

        function formatPrice(priceUSD) {
            const converted = priceUSD * exchangeRate;
            const locales = { 'USD': 'en-US', 'EUR': 'de-DE', 'VES': 'es-VE', 'PEN': 'es-PE' };
            return new Intl.NumberFormat(locales[currentCurrency] || 'es-ES', { 
                style: 'currency', 
                currency: currentCurrency 
            }).format(converted);
        }

        // --- RENDERIZADO ---
        function renderDetail() {
            if (!p) {
                document.getElementById('product-detail').innerHTML = "<h1>Producto no encontrado</h1>";
                return;
            }

            document.getElementById('product-detail').innerHTML = `
                <div class="slider-container">
                    ${p.images.length > 1 ? '<button class="slider-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>' : ''}
                    <div class="slider-wrapper" id="slider-wrapper">
                        ${p.images.map(img => `<img src="${img}" alt="${p.name}">`).join('')}
                    </div>
                    ${p.images.length > 1 ? '<button class="slider-btn next-btn" onclick="changeSlide(1)">&#10095;</button>' : ''}
                    <div class="slider-dots" id="slider-dots">
                        ${p.images.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')}
                    </div>
                </div>

                <div class="info-section">
                    <span class="category-badge">${p.category}</span>
                    <h1>${p.name}</h1>
                    <div class="price-tag">${formatPrice(p.priceUSD)}</div>
                    
                    <div class="description-container">
                        <p class="full-description" id="text-desc">${p.description}</p>
                        <button class="btn-toggle-text" id="btn-toggle" onclick="toggleDescription()">
                            Leer más ↓
                        </button>
                    </div>
                    
                    <div class="buy-box">
                        <div style="margin-bottom:10px">✅ Envío gratis</div>
                        <div style="margin-bottom:10px">🛡️ Garantía de 12 meses</div>
                        <div class="benefit-item">💳 Hasta 6 cuotas sin interés</div>
                        <button class="btn-add" onclick="handleAddToCart(${p.id})">Añadir al Carrito</button>
                        
                        <!-- NUEVO: Contenedor con los botones de compartir -->
                        <div class="share-container">
                            <button class="btn-share btn-whatsapp" onclick="shareOnWhatsApp()">
                                <span>💬</span> Compartir WhatsApp
                            </button>
                            <button class="btn-share btn-copy" onclick="copyProductLink()">
                                <span>🔗</span> Copiar Enlace
                            </button>
                        </div>
                    </div>
                </div>
            `;
            initTouchEvents();
        }

        // --- LÓGICA INTERACTIVA ---
        function toggleDescription() {
            const textDesc = document.getElementById('text-desc');
            const btn = document.getElementById('btn-toggle');
            textDesc.classList.toggle('expanded');
            btn.innerHTML = textDesc.classList.contains('expanded') ? 'Leer menos ↑' : 'Leer más ↓';
        }

        function changeSlide(direction) {
            const wrapper = document.getElementById('slider-wrapper');
            const dots = document.querySelectorAll('.dot');
            currentSlide = (currentSlide + direction + p.images.length) % p.images.length;
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        function goToSlide(index) {
            currentSlide = index;
            const wrapper = document.getElementById('slider-wrapper');
            const dots = document.querySelectorAll('.dot');
            wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        }

        // --- GESTOS TÁCTILES ---
        let touchStartX = 0;
        function initTouchEvents() {
            const slider = document.getElementById('slider-wrapper');
            if(!slider) return;
            slider.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
            slider.addEventListener('touchend', e => {
                const touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) changeSlide(1);
                if (touchEndX - touchStartX > 50) changeSlide(-1);
            }, {passive: true});
        }

        // --- MANEJO DEL CARRITO Y ACCIONES ---
        function handleAddToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const product = allProducts.find(item => item.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            showAddedAnimation(product.name, '🛒', '¡Añadido!');
        }

        // NUEVO: Función para compartir en WhatsApp
        function shareOnWhatsApp() {
            if (!p) return;
            const currentUrl = window.location.href;
            const text = encodeURIComponent(`¡Mira este producto en SmartStore!\n\n*${p.name}*\nPrecio: ${formatPrice(p.priceUSD)}\n\nVer más detalles aquí:\n${currentUrl}`);
            window.open(`https://api.whatsapp.com/send?text=${text}`, '_blank');
        }

        // NUEVO: Función para copiar enlace con la API Clipboard
        function copyProductLink() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                // Reutilizamos tu sistema de animación Toast cambiando los textos
                showAddedAnimation('Enlace copiado al portapapeles', '🔗', '¡Copiado!');
            }).catch(err => {
                console.error('Error al copiar el enlace: ', err);
            });
        }
        
        // MODIFICADO: Ajustamos la animación para soportar dinámicamente diferentes íconos y títulos
        function showAddedAnimation(textMsg, icon = '🛒', title = '¡Añadido!') {
            let toast = document.getElementById('toast-msg');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast-msg';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }

            toast.innerHTML = `
                <span class="toast-icon">${icon}</span>
                <div>
                    <div style="font-weight:bold">${title}</div>
                    <div style="font-size:0.85rem">${textMsg}</div>
                </div>
            `;

            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Iniciar todo
        initApp();
    </script>
